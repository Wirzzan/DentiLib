<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <title>Accueil Prothésiste</title>
  <link rel="stylesheet" href="./styles/ui.css" />
  <link rel="stylesheet" href="./styles/home.css" />
  <link rel="stylesheet" href="/styles/legal.css" />
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>Mes fiches travaux</h1>
      <button id="logoutBtn">Déconnexion</button>
    </div>

    <button id="manageActesBtn">Gérer mes actes</button>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Rechercher par patient ou numéro de fiche" />
    </div>

    <table id="worksheetTable">
      <thead>
        <tr>
          <th>Numéro fiche</th>
          <th>Patient</th>
          <th>Email</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="worksheetTable"></tbody>
    </table>

  </div>

  <script src="/js/api.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/prothesist.js"></script>

  <footer>
    <p>MediLink Solutions © 2025 DentiLib</p>
    <p class="legal-footer-links">
      <button type="button" class="legal-link" data-legal="mentions">Mentions légales</button>
      ·
      <button type="button" class="legal-link" data-legal="privacy">Politique de confidentialité</button>
    </p>
  </footer>
  <script src="/js/legal.js"></script>
</body>
</html>
