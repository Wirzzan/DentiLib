<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste des actes</title>
  <link rel="stylesheet" href="/styles/actManage.css" />
  <link rel="stylesheet" href="/styles/legal.css" />
  <link rel="stylesheet" href="/styles/prothesistActs.css" />
</head>
<body>
  <div class="container">
    <h1>Liste des actes</h1>

    <table>
      <thead>
        <tr>
          <th>Acte</th>
          <th>Description</th>
          <th>Prix (€)</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="actsBody">
      </tbody>
    </table>

    <div class="table-footer">
      <button class="btn btn-add" id="addActBtn" type="button">Ajouter un acte</button>
      <button class="btn btn-return" id="returnBtn" type="button">Retour</button>
    </div>
  </div>

  <footer>
    <p>MediLink Solutions © 2025 DentiLib</p>
    <p class="legal-footer-links">
      <button type="button" class="legal-link" data-legal="mentions">Mentions légales</button>
      ·
      <button type="button" class="legal-link" data-legal="privacy">Politique de confidentialité</button>
    </p>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/legal.js"></script>
  <script src="/js/prothesistActs.js"></script>
</body>
</html>
