<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DentiLib — Accès à l'application</title>
    <link rel="stylesheet" href="/styles/login.css" />
    <link rel="stylesheet" href="/styles/legal.css" />
</head>
<body>
    <header class="login-header">
        <a class="login-header__brand" href="/" aria-label="DentiLib — accueil">
            <img
                src="/img/logo%20dentilib%202.png"
                alt="DentiLib — Connecter, Partager, Simplifier"
                class="login-header__logo"
            />
        </a>
        <h1 class="login-header__title">DentiLib</h1>
    </header>

    <main>
        <section>
            <h2>Accédez à votre espace professionnel</h2>
            <form id="loginForm">
                <input type="text" id="email" name="email" placeholder="Email"  />
                <input type="password" id="password" name="password" placeholder="Mot de passe" />
                <button type="submit" id="submitButton">Se connecter</button>
            </form>
            <p>Pas encore inscrit ? Contactez l'administrateur.</p>
            <div><p id="messageLogin"></p></div>
        </section>
    </main>

    <footer>
        <p>MediLink Solutions © 2025 DentiLib</p>
        <p class="legal-footer-links">
            <button type="button" class="legal-link" data-legal="mentions">Mentions légales</button>
            ·
            <button type="button" class="legal-link" data-legal="privacy">Politique de confidentialité</button>
        </p>
    </footer>

    <script src="/js/legal.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
