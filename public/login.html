<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DentiLib — Accès à l'application</title>
    <link rel="stylesheet" href="/styles/login.css" />
</head>
<body>
    <header>
        <h1>DentiLib</h1>
    </header>

    <main>
        <section>
            <h2>Accédez à votre espace professionnel</h2>
            <form id="loginForm">
                <input type="text" id="email" name="email" placeholder="Email"  />
                <input type="password" id="password" name="password" placeholder="Mot de passe" />
                <button type="submit" id="submitButton">Se connecter</button>
            </form>
            <p>Pas encore inscrit ? Contactez l'administrateur.</p>
            <div><p id="messageLogin"></p></div>
        </section>
    </main>

    <footer>
        <p>Consulting School Project © 2025 Dentilib</p>
    </footer>

    <script src="/js/login.js"></script>
</body>
</html>
