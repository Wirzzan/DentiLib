<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste des actes</title>
  <link rel="stylesheet" href="./styles/ui.css" />
  <link rel="stylesheet" href="./styles/actManage.css" />
  <link rel="stylesheet" href="/styles/legal.css" />
</head>
<body>
  <div class="container">
    <h1>Liste des actes</h1>

    <table>
      <thead>
        <tr>
          <th>Nom de l'acte</th>
          <th>Description</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="actsTable">
      </tbody>
    </table>

    <div class="table-footer">
      <button class="btn btn-add" id="addActBtn">Ajouter un acte</button>
      <button class="btn btn-return" id="returnBtn">Retour</button>
    </div>
  </div>

  <!-- Modal Création-->
  <div id="actModal" class="modal">
    <div class="modal-content">
      <button type="button" class="close" aria-label="Fermer">&times;</button>
      <h2>Ajouter un acte</h2>
      <form id="addActForm">
        <input type="text" name="name" placeholder="Nom de l'acte" required />
        <input type="text" name="description" placeholder="Description" required />
        <button type="submit">Créer</button>
      </form>
    </div>
  </div>

  <!-- Modal Modification -->
<div id="actModalEdit" class="modal">
  <div class="modal-content">
    <button type="button" class="close" aria-label="Fermer">&times;</button>
    <h2>Modifier un acte</h2>
    <form id="editActForm">
      <input type="text" name="name" placeholder="Nom de l'acte" required />
      <input type="text" name="description" placeholder="Description" required />
      <button type="submit">Modifier</button>
    </form>
  </div>
</div>

  <script src="./js/ui.js"></script>
  <script src="./js/act.js"></script>

  <footer>
    <p>MediLink Solutions © 2025 DentiLib</p>
    <p class="legal-footer-links">
      <button type="button" class="legal-link" data-legal="mentions">Mentions légales</button>
      ·
      <button type="button" class="legal-link" data-legal="privacy">Politique de confidentialité</button>
    </p>
  </footer>
  <script src="/js/legal.js"></script>
</body>
</html>
